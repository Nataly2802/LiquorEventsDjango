{% extends 'base/base.html' %}

{% block contenido %}

<h1 class="mb-4">🏆 Torneos Disponibles</h1>

<div class="row">

{% for torneo in torneos %}

<div class="col-md-4">

<div class="card mb-4 shadow">

<div class="card-body">

<h5 class="card-title">{{ torneo.nombre }}</h5>

<p class="card-text">{{ torneo.descripcion }}</p>

<p>
<strong>Fecha:</strong> {{ torneo.fecha }}
</p>

<p>
<strong>Cupos:</strong> {{ torneo.cupos }}
</p>

<a href="/inscribirse/{{ torneo.id }}/" class="btn btn-primary">
Inscribirse
</a>

</div>

</div>

</div>

{% empty %}

<p>No hay torneos disponibles</p>

{% endfor %}

</div>

{% endblock %}
