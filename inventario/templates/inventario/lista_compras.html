{% extends 'base/base.html' %}
{% block contenido %}

<h2 class="mb-4">Historial de Compras</h2>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Proveedor</th>
            <th>Fecha</th>
        </tr>
    </thead>

    <tbody>
        {% for c in compras %}
        <tr>
            <td>{{ c.producto.nombre }}</td>
            <td>{{ c.cantidad }}</td>
            <td>{{ c.proveedor }}</td>
            <td>{{ c.fecha }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{% url 'registrar_compra' %}" class="btn btn-primary">
    Nueva Compra
</a>
<a href="{% url 'lista_productos' %}" class="btn btn-secondary">Volver</a>

{% endblock %}
